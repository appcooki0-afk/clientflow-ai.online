<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEADFLOW | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            color: #fff;
            min-height: 100vh;
            padding: 40px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
        }
        .logo span { font-weight: 300; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 32px; margin-bottom: 20px; }
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
        }
        .stat-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 36px;
            font-weight: 700;
            color: #22d3ee;
        }
        .stat-label { font-size: 13px; color: #888; margin-top: 8px; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            overflow: hidden;
        }
        th, td {
            padding: 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        th {
            background: rgba(255,255,255,0.05);
            font-weight: 600;
            font-size: 13px;
            color: #888;
            text-transform: uppercase;
        }
        tr:hover { background: rgba(255,255,255,0.03); }
        .btn {
            padding: 8px 16px;
            background: #22d3ee;
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { opacity: 0.8; }
        .package {
            padding: 4px 10px;
            background: rgba(34,211,238,0.2);
            color: #22d3ee;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }
        .empty { text-align: center; padding: 40px; color: #666; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">LEAD<span>FLOW</span></div>
        <a href="/" class="btn">← Back to Website</a>
    </div>

    <h1>Dashboard</h1>

    <div class="stats">
        <div class="stat">
            <div class="stat-value">-</div>
            <div class="stat-label">Total Leads</div>
        </div>
        <div class="stat">
            <div class="stat-value">-</div>
            <div class="stat-label">Potential Revenue</div>
        </div>
        <div class="stat">
            <div class="stat-value">-</div>
            <div class="stat-label">STARTER</div>
        </div>
        <div class="stat">
            <div class="stat-value">-</div>
            <div class="stat-label">GROWTH</div>
        </div>
    </div>

    <h1>Recent Leads</h1>
    <table>
        <thead>
            <tr>
                <th>Business</th>
                <th>Contact</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Package</th>
                <th>Date</th>
                <th>Contract</th>
            </tr>
        </thead>
        <tbody id="leadsTable">
            <tr><td colspan="7" class="empty">Loading...</td></tr>
        </tbody>
    </table>

    <script>
        const prices = { starter: 19, growth: 49, scale: 99 };
        const setupPrices = { starter: 497, growth: 797, scale: 1297 };

        // Note: With GitHub Pages + Formspree, leads are managed in Formspree dashboard
        // This page shows static info - check https://formspree.io/forms/xpwzgdpj for live leads
        document.getElementById('leadsTable').innerHTML = '<tr><td colspan="7" class="empty">Leads are now managed in Formspree dashboard.<br><br><a href="https://formspree.io/forms/xpwzgdpj" class="btn" target="_blank">View Leads in Formspree</a></td></tr>';
    </script>
</body>
</html>
